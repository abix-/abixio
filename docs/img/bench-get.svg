<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="system-ui,-apple-system,sans-serif">

  <text x="340" y="28" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#24292f">GET throughput (MB/s, higher is better)</text>

  <!-- grid lines (scale 0-900, bar area 120-570 = 450px) -->
  <line x1="120" y1="45" x2="120" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="195" y1="45" x2="195" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="270" y1="45" x2="270" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="345" y1="45" x2="345" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="420" y1="45" x2="420" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="495" y1="45" x2="495" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>
  <line x1="570" y1="45" x2="570" y2="275" style="stroke:#d1d9e0;stroke-width:0.5"/>

  <text x="120" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">0</text>
  <text x="195" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">150</text>
  <text x="270" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">300</text>
  <text x="345" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">450</text>
  <text x="420" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">600</text>
  <text x="495" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">750</text>
  <text x="570" y="290" text-anchor="middle" style="font-size:11px;fill:#656d76">900</text>

  <!-- 10MB group (0.5px per MB/s) -->
  <text x="60" y="72" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#24292f">10MB</text>

  <text x="115" y="96" text-anchor="end" style="font-size:13px;fill:#24292f">AbixIO</text>
  <rect x="120" y="82" width="72" height="24" rx="3" fill="#2563eb"/>
  <text x="198" y="99" style="font-size:13px;font-weight:600;fill:#24292f">143 MB/s</text>

  <text x="115" y="126" text-anchor="end" style="font-size:13px;fill:#24292f">RustFS</text>
  <rect x="120" y="112" width="50" height="24" rx="3" fill="#d97706"/>
  <text x="176" y="129" style="font-size:13px;font-weight:600;fill:#24292f">99 MB/s</text>

  <text x="115" y="156" text-anchor="end" style="font-size:13px;fill:#24292f">MinIO</text>
  <rect x="120" y="142" width="62" height="24" rx="3" fill="#059669"/>
  <text x="188" y="159" style="font-size:13px;font-weight:600;fill:#24292f">124 MB/s</text>

  <!-- 1GB group -->
  <text x="60" y="200" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#24292f">1GB</text>

  <text x="115" y="224" text-anchor="end" style="font-size:13px;fill:#24292f">AbixIO</text>
  <rect x="120" y="210" width="186" height="24" rx="3" fill="#2563eb"/>
  <text x="312" y="227" style="font-size:13px;font-weight:600;fill:#24292f">372 MB/s</text>

  <text x="115" y="254" text-anchor="end" style="font-size:13px;fill:#24292f">RustFS</text>
  <rect x="120" y="240" width="288" height="24" rx="3" fill="#d97706"/>
  <text x="414" y="257" style="font-size:13px;font-weight:600;fill:#24292f">576 MB/s</text>

  <text x="115" y="284" text-anchor="end" style="font-size:13px;fill:#24292f">MinIO</text>
  <rect x="120" y="270" width="425" height="24" rx="3" fill="#059669"/>
  <text x="551" y="287" style="font-size:13px;font-weight:600;fill:#24292f">849 MB/s</text>

  <!-- legend -->
  <rect x="205" y="305" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="221" y="316" style="font-size:12px;fill:#24292f">AbixIO</text>
  <rect x="285" y="305" width="12" height="12" rx="2" fill="#d97706"/>
  <text x="301" y="316" style="font-size:12px;fill:#24292f">RustFS</text>
  <rect x="365" y="305" width="12" height="12" rx="2" fill="#059669"/>
  <text x="381" y="316" style="font-size:12px;fill:#24292f">MinIO</text>
</svg>
