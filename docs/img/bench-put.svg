<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="system-ui,-apple-system,sans-serif">

  <text x="340" y="28" text-anchor="middle" style="font-size:16px;font-weight:600;fill:currentColor">PUT throughput (MB/s, higher is better)</text>

  <!-- grid: 0-600, bar area 120-570 = 450px, 0.75px per MB/s -->
  <line x1="120" y1="45" x2="120" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="195" y1="45" x2="195" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="270" y1="45" x2="270" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="345" y1="45" x2="345" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="420" y1="45" x2="420" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="495" y1="45" x2="495" y2="390" style="stroke:currentColor;opacity:0.15"/>
  <line x1="570" y1="45" x2="570" y2="390" style="stroke:currentColor;opacity:0.15"/>

  <text x="120" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">0</text>
  <text x="195" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">100</text>
  <text x="270" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">200</text>
  <text x="345" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">300</text>
  <text x="420" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">400</text>
  <text x="495" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">500</text>
  <text x="570" y="405" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">600</text>

  <!-- 10MB group -->
  <text x="60" y="90" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">10MB</text>

  <text x="115" y="114" text-anchor="end" style="font-size:13px;fill:currentColor">AbixIO</text>
  <rect x="120" y="100" width="60" height="24" rx="3" fill="#2563eb"/>
  <text x="186" y="117" style="font-size:13px;font-weight:600;fill:currentColor">80 MB/s</text>

  <text x="115" y="144" text-anchor="end" style="font-size:13px;fill:currentColor">RustFS</text>
  <rect x="120" y="130" width="61" height="24" rx="3" fill="#d97706"/>
  <text x="187" y="147" style="font-size:13px;font-weight:600;fill:currentColor">81 MB/s</text>

  <text x="115" y="174" text-anchor="end" style="font-size:13px;fill:currentColor">MinIO</text>
  <rect x="120" y="160" width="70" height="24" rx="3" fill="#059669"/>
  <text x="196" y="177" style="font-size:13px;font-weight:600;fill:currentColor">93 MB/s</text>

  <!-- 1GB group -->
  <text x="60" y="230" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">1GB</text>

  <text x="115" y="254" text-anchor="end" style="font-size:13px;fill:currentColor">AbixIO</text>
  <rect x="120" y="240" width="331" height="24" rx="3" fill="#2563eb"/>
  <text x="457" y="257" style="font-size:13px;font-weight:600;fill:currentColor">441 MB/s</text>

  <text x="115" y="284" text-anchor="end" style="font-size:13px;fill:currentColor">RustFS</text>
  <rect x="120" y="270" width="404" height="24" rx="3" fill="#d97706"/>
  <text x="530" y="287" style="font-size:13px;font-weight:600;fill:currentColor">538 MB/s</text>

  <text x="115" y="314" text-anchor="end" style="font-size:13px;fill:currentColor">MinIO</text>
  <rect x="120" y="300" width="397" height="24" rx="3" fill="#059669"/>
  <text x="523" y="317" style="font-size:13px;font-weight:600;fill:currentColor">529 MB/s</text>

  <!-- 4KB group (keep-alive, obj/sec) -->
  <text x="60" y="365" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">4KB</text>
  <text x="60" y="379" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">obj/sec</text>

  <text x="115" y="395" text-anchor="end" style="font-size:12px;fill:currentColor">AbixIO</text>
  <rect x="120" y="383" width="247" height="20" rx="3" fill="#2563eb"/>
  <text x="373" y="398" style="font-size:12px;font-weight:600;fill:currentColor">1096</text>

  <text x="115" y="415" text-anchor="end" style="font-size:12px;fill:currentColor">RustFS</text>
  <rect x="120" y="403" width="299" height="20" rx="3" fill="#d97706"/>
  <text x="425" y="418" style="font-size:12px;font-weight:600;fill:currentColor">1329</text>

  <text x="115" y="435" text-anchor="end" style="font-size:12px;fill:currentColor">MinIO</text>
  <rect x="120" y="423" width="268" height="20" rx="3" fill="#059669"/>
  <text x="394" y="438" style="font-size:12px;font-weight:600;fill:currentColor">1189</text>

</svg>
