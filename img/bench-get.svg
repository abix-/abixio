<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="system-ui,-apple-system,sans-serif">

  <text x="390" y="28" text-anchor="middle" style="font-size:16px;font-weight:600;fill:currentColor">GET throughput (higher is better)</text>

  <!-- grid: 0-1200, bar area 120-720 = 600px, 0.5px per MB/s -->
  <line x1="120" y1="45" x2="120" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="220" y1="45" x2="220" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="320" y1="45" x2="320" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="420" y1="45" x2="420" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="520" y1="45" x2="520" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="620" y1="45" x2="620" y2="330" style="stroke:currentColor;opacity:0.15"/>
  <line x1="720" y1="45" x2="720" y2="330" style="stroke:currentColor;opacity:0.15"/>

  <text x="120" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">0</text>
  <text x="220" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">200</text>
  <text x="320" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">400</text>
  <text x="420" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">600</text>
  <text x="520" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">800</text>
  <text x="620" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">1000</text>
  <text x="720" y="345" text-anchor="middle" style="font-size:11px;fill:currentColor;opacity:0.6">1200</text>

  <!-- 10MB group (MB/s) -->
  <text x="60" y="78" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">10MB</text>
  <text x="60" y="92" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">MB/s</text>

  <text x="115" y="110" text-anchor="end" style="font-size:13px;fill:currentColor">AbixIO</text>
  <rect x="120" y="97" width="54" height="22" rx="3" fill="#2563eb"/>
  <text x="180" y="113" style="font-size:13px;font-weight:600;fill:currentColor">107</text>

  <text x="115" y="135" text-anchor="end" style="font-size:13px;fill:currentColor">RustFS</text>
  <rect x="120" y="122" width="55" height="22" rx="3" fill="#d97706"/>
  <text x="181" y="138" style="font-size:13px;font-weight:600;fill:currentColor">109</text>

  <text x="115" y="160" text-anchor="end" style="font-size:13px;fill:currentColor">MinIO</text>
  <rect x="120" y="147" width="63" height="22" rx="3" fill="#059669"/>
  <text x="189" y="163" style="font-size:13px;font-weight:600;fill:currentColor">126</text>

  <!-- 1GB group (MB/s) -->
  <text x="60" y="205" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">1GB</text>
  <text x="60" y="219" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">MB/s</text>

  <text x="115" y="237" text-anchor="end" style="font-size:13px;fill:currentColor">AbixIO</text>
  <rect x="120" y="224" width="198" height="22" rx="3" fill="#2563eb"/>
  <text x="324" y="240" style="font-size:13px;font-weight:600;fill:currentColor">396</text>

  <text x="115" y="262" text-anchor="end" style="font-size:13px;fill:currentColor">RustFS</text>
  <rect x="120" y="249" width="342" height="22" rx="3" fill="#d97706"/>
  <text x="468" y="265" style="font-size:13px;font-weight:600;fill:currentColor">684</text>

  <text x="115" y="287" text-anchor="end" style="font-size:13px;fill:currentColor">MinIO</text>
  <rect x="120" y="274" width="551" height="22" rx="3" fill="#059669"/>
  <text x="677" y="290" style="font-size:13px;font-weight:600;fill:currentColor">1102</text>

  <!-- 4KB group (keep-alive, obj/sec) -->
  <text x="60" y="340" text-anchor="middle" style="font-size:13px;font-weight:600;fill:currentColor">4KB</text>
  <text x="60" y="354" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">obj/sec</text>

  <!-- scale for 4KB: 0-1500, bar area 120-720 = 600px, 0.4px per obj/s -->
  <text x="120" y="430" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">0</text>
  <text x="320" y="430" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">500</text>
  <text x="520" y="430" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">1000</text>
  <text x="720" y="430" text-anchor="middle" style="font-size:10px;fill:currentColor;opacity:0.6">1500</text>

  <text x="115" y="372" text-anchor="end" style="font-size:12px;fill:currentColor">AbixIO</text>
  <rect x="120" y="360" width="351" height="20" rx="3" fill="#2563eb"/>
  <text x="477" y="375" style="font-size:12px;font-weight:600;fill:currentColor">1315</text>

  <text x="115" y="395" text-anchor="end" style="font-size:12px;fill:currentColor">RustFS</text>
  <rect x="120" y="383" width="360" height="20" rx="3" fill="#d97706"/>
  <text x="486" y="398" style="font-size:12px;font-weight:600;fill:currentColor">1349</text>

  <text x="115" y="418" text-anchor="end" style="font-size:12px;fill:currentColor">MinIO</text>
  <rect x="120" y="406" width="287" height="20" rx="3" fill="#059669"/>
  <text x="413" y="421" style="font-size:12px;font-weight:600;fill:currentColor">1073</text>

  <!-- legend -->
  <rect x="255" y="440" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="271" y="451" style="font-size:12px;fill:currentColor">AbixIO</text>
  <rect x="335" y="440" width="12" height="12" rx="2" fill="#d97706"/>
  <text x="351" y="451" style="font-size:12px;fill:currentColor">RustFS</text>
  <rect x="415" y="440" width="12" height="12" rx="2" fill="#059669"/>
  <text x="431" y="451" style="font-size:12px;fill:currentColor">MinIO</text>
</svg>
